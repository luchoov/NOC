services:

  noc-web:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "${NOC_WEB_PORT:-8080}:8080"

  minio:
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
